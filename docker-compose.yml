# version: "3.8"

x-airflow-common:
  ## Local
  # build:
  #   context: ./camair-etl
  #   dockerfile: ./docker/Dockerfile
  # image: camair-airflow:2.8.1-custom

  ## Remote
  &airflow-common 
  image: ngentina/camair-airflow:latest
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW_UID: 50000
    PYTHONPATH: /opt/airflow
  volumes:
    - ./camair-etl/dags:/opt/airflow/dags
    - ./camair-etl/logs:/opt/airflow/logs
    - ./camair-etl/data:/opt/airflow/data
    - ./camair-etl/src:/opt/airflow/src
    - ./camair-etl/config:/opt/airflow/config
  depends_on:
    - postgres

services:

  # -----------------------------
  # 1. POSTGRES DATABASE (AIRFLOW BACKEND)
  # -----------------------------
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-db:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------
  # 2. PGADMIN
  # -----------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@etl.com
      PGADMIN_DEFAULT_PASSWORD: admin_etl
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  # -----------------------------
  # 3. AIRFLOW
  # -----------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command: -c "airflow db upgrade && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # -----------------------------
  # 4. API BACKEND
  # -----------------------------
  # api:
  #   build:
  #     context: ./api
  #     dockerfile: Dockerfile
  #   container_name: camair-api
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_NAME: camair
  #     DB_USER: airflow
  #     DB_PASSWORD: airflow
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: unless-stopped

  # -----------------------------
  # 5. ZOOKEEPER
  # -----------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # -----------------------------
  # 6. KAFKA
  # -----------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Internal listener for Docker containers, External listener for your host machine
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # -----------------------------
  # 7. SPARK MASTER
  # -----------------------------
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8081:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------
  # 8. SPARK WORKER
  # -----------------------------
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master

  # -----------------------------
  # 9. SPARK STREAMING JOB
  # -----------------------------
  spark-job:
    image: apache/spark:3.5.1
    container_name: spark-job
    user: root
    # Run spark-submit directly to start the continuous streaming process
    command: >
      /opt/spark/bin/spark-submit --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.1,org.postgresql:postgresql:42.6.0 --master spark://spark-master:7077 /opt/app/spark/process_air_quality.py
    depends_on: 
      spark-master:
        condition: service_healthy
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ./camair-etl/src/elt/spark:/opt/app/spark
      - ./camair-etl/data:/opt/spark/data
    restart: on-failure

volumes:
  postgres-db:
  pgadmin-data:
